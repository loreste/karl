apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: karl

namespace: default

resources:
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  # Uncomment if using Prometheus Operator
  # - servicemonitor.yaml

commonLabels:
  app.kubernetes.io/name: karl
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

images:
  - name: loreste/karl
    newTag: latest
