apiVersion: apps/v1
kind: Deployment
metadata:
  name: karl
  labels:
    app: karl
    app.kubernetes.io/name: karl
    app.kubernetes.io/component: media-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karl
  template:
    metadata:
      labels:
        app: karl
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # Use host network for RTP media - simplest approach for media servers
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
      - name: karl
        image: loreste/karl:latest
        imagePullPolicy: Always

        ports:
        - name: ng-protocol
          containerPort: 22222
          protocol: UDP
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8086
          protocol: TCP
        - name: metrics
          containerPort: 9091
          protocol: TCP

        env:
        - name: KARL_LOG_LEVEL
          value: "info"
        - name: KARL_CONFIG_PATH
          value: "/etc/karl/config.json"
        - name: KARL_RUN_DIR
          value: "/var/run/karl"
        - name: KARL_HEALTH_PORT
          value: ":8086"
        - name: KARL_METRICS_PORT
          value: ":9091"
        - name: KARL_API_PORT
          value: ":8080"
        # Optional: Override config values via environment
        # - name: KARL_MYSQL_DSN
        #   valueFrom:
        #     secretKeyRef:
        #       name: karl-secrets
        #       key: mysql-dsn
        # - name: KARL_REDIS_ADDR
        #   value: "redis:6379"

        volumeMounts:
        - name: config
          mountPath: /etc/karl
          readOnly: true
        - name: recordings
          mountPath: /var/lib/karl/recordings
        - name: run
          mountPath: /var/run/karl

        # Startup probe - allows slow startup before liveness kicks in
        startupProbe:
          httpGet:
            path: /startup
            port: 8086
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30  # 5s * 30 = 150s max startup time

        # Liveness probe - restart if process is deadlocked
        livenessProbe:
          httpGet:
            path: /live
            port: 8086
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe - remove from service if not ready to accept traffic
        readinessProbe:
          httpGet:
            path: /ready
            port: 8086
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "2000m"

        securityContext:
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

      volumes:
      - name: config
        configMap:
          name: karl-config
      - name: recordings
        persistentVolumeClaim:
          claimName: karl-recordings
      - name: run
        emptyDir: {}

      # Prefer scheduling on nodes with low latency
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: node-role.kubernetes.io/media
                operator: Exists
