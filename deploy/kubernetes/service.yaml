apiVersion: v1
kind: Service
metadata:
  name: karl
  labels:
    app: karl
spec:
  type: ClusterIP
  ports:
  - name: ng-protocol
    port: 22222
    targetPort: 22222
    protocol: UDP
  - name: api
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: health
    port: 8086
    targetPort: 8086
    protocol: TCP
  - name: metrics
    port: 9091
    targetPort: 9091
    protocol: TCP
  selector:
    app: karl

---
# Headless service for direct pod access (useful for SIP proxies)
apiVersion: v1
kind: Service
metadata:
  name: karl-headless
  labels:
    app: karl
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: ng-protocol
    port: 22222
    targetPort: 22222
    protocol: UDP
  selector:
    app: karl

---
# NodePort service for external access (alternative to hostNetwork)
apiVersion: v1
kind: Service
metadata:
  name: karl-external
  labels:
    app: karl
spec:
  type: NodePort
  ports:
  - name: ng-protocol
    port: 22222
    targetPort: 22222
    nodePort: 32222
    protocol: UDP
  - name: api
    port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
  selector:
    app: karl
